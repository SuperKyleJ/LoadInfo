<!DOCTYPE html>
<html>
<head>
  <title>Trailer Number</title>
  <style>
    /* Normal phone / desktop layout */
.full-layout {
  display: block;
}

.glasses-layout {
  display: none;
}

/* Small display layout */
@media (max-width: 500px) {
  .full-layout {
    display: none;
  }

  .glasses-layout {
    display: block;
  }

  body {
    font-size: 22px;
    padding: 12px;
  }
}
    body {
      font-family: Arial, sans-serif;
      padding: 30px;
      max-width: 400px;
      margin: auto;
    }

    input, button {
      width: 100%;
      font-size: 20px;
      padding: 12px;
      margin-top: 12px;
      box-sizing: border-box;
    }

    #currentTrailer {
      font-size: 28px;
      font-weight: bold;
      margin-top: 20px;
    }

    #message {
      margin-top: 12px;
      color: green;
    }
    .glasses-layout {
  font-family: Arial, sans-serif;
  text-align: center;
}

.big-value {
  font-size: 28px;
  font-weight: bold;
  margin: 12px 0;
}
  </style>
</head>
<body>

  <div class="full-layout">
  <h1>Trailer Info</h1>

  <p>Current Trailer: <strong id="currentTrailerFull"></strong></p>
  <p>Current Load: <strong id="currentLoadFull"></strong></p>
  <p>Dock: <strong id="currentDockFull"></strong></p>

  <input id="dockNumber" placeholder="Dock Number">
  <input id="trailerInput" placeholder="Trailer Number">
  <input id="loadNumber" placeholder="Load Number">

  <button onclick="saveInfo()">Save</button>
</div>

<div class="glasses-layout">
    <button class="big-value" onclick="clearDock()">
    Dock: <span id="currentDockGlasses"></span>
</button>

<button class="big-value" onclick="clearTrl()">
    Trailer: <span id="currentTrailerGlasses"></span>
</button>
<button class="big-value" onclick="clearLoad()">
    Load: <span id="currentLoadGlasses"></span>
</button>
  
</div>

  <script>
    const webAppURL3 = "https://script.google.com/macros/s/AKfycbwhZh4BwiyQjaun6s8PHAyLxJs06m3J3ZfX_yn6XslWS-MUm4iWnoluENVrt8T42bRE/exec";


async function loadAll() {
  const response = await fetch(webAppURL3);
  const data = await response.json();

document.getElementById("currentTrailerFull").textContent = data.trailerNumber || "None";
document.getElementById("currentLoadFull").textContent = data.loadNumber || "None";

document.getElementById("currentTrailerGlasses").textContent = data.trailerNumber || "None";
document.getElementById("currentLoadGlasses").textContent = data.loadNumber || "None";

document.getElementById("currentDockFull").textContent = data.dockNumber || "None";
document.getElementById("currentDockGlasses").textContent = data.dockNumber || "None";

}
async function saveInfo() {
  const trailerNumber = document.getElementById("trailerInput").value;
  const loadNumber = document.getElementById("loadInput").value;
  const dockNumber = document.getElementById("dockNumber").value;

  const response = await fetch(webAppURL3, {
    method: "POST",
    body: JSON.stringify({
      trailerNumber: trailerNumber,
      loadNumber: loadNumber,
      dockNumber: dockNumber
    })
  });

  const result = await response.json();

  console.log(result);

  document.getElementById("currentTrailer").textContent = result.trailerNumber;
  document.getElementById("currentLoad").textContent = result.loadNumber;
  document.getElementById("currentDock").textContent = result.dockNumber;

  document.getElementById("message").textContent = "Saved";

  setTimeout(() => {
    document.getElementById("message").textContent = "";
  }, 2000);
}
async function clearDock() {
  const trailerNumber = document.getElementById("currentTrailerFull").textContent;
  const loadNumber = document.getElementById("currentLoadFull").textContent;
  const dockNumber = "";
  const response = await fetch(webAppURL3, {
    method: "POST",
    body: JSON.stringify({
      trailerNumber: trailerNumber,
      loadNumber: loadNumber,
      dockNumber: dockNumber
    })
  });
  const result = await response.json();
  console.log(result);
  await loadAll();
  document.getElementById("message").textContent = "Saved";
}  
async function clearLoad() {
  const trailerNumber = document.getElementById("currentTrailerFull").textContent;
  const loadNumber = "";
  const dockNumber = document.getElementById("currentDockFull").textContent;
  const response = await fetch(webAppURL3, {
    method: "POST",
    body: JSON.stringify({
      trailerNumber: trailerNumber,
      loadNumber: loadNumber,
      dockNumber: dockNumber
    })
  });
  const result = await response.json();
  console.log(result);
  await loadAll();
  document.getElementById("message").textContent = "Saved";
}  
async function clearTrl() {
  const trailerNumber = "";
  const loadNumber = document.getElementById("currentLoadFull").textContent;
  const dockNumber = document.getElementById("currentDockFull").textContent;
  const response = await fetch(webAppURL3, {
    method: "POST",
    body: JSON.stringify({
      trailerNumber: trailerNumber,
      loadNumber: loadNumber,
      dockNumber: dockNumber
    })
  });
  const result = await response.json();
  console.log(result);
  await loadAll();
  document.getElementById("message").textContent = "Saved";
}
 async function clearAll() {
  const trailerNumber = "";
  const loadNumber = "";
  const dockNumber = "";
  const response = await fetch(webAppURL3, {
    method: "POST",
    body: JSON.stringify({
      trailerNumber: trailerNumber,
      loadNumber: loadNumber,
      dockNumber: dockNumber
    })
  });
  const result = await response.json();
  console.log(result);
  await loadAll();
  document.getElementById("message").textContent = "Saved";
}
loadAll();
    
  </script>

</body>
</html>
